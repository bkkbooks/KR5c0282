front:
  text: 太清修丹袐訣興士
  hash: sha256:cf7c216a9abe0a691b2f6f40dd5e0d7ac892be517961c6643a5804e331ff0009
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0282_HFL_000-001a, image: hfl/0583/0583-130.png}
body:
  text: 採種靈砂修丹法其法於十二月初一日先以美酒珍味肉食及止怒慾長齋謂上慾也二月種砂兼行齋法其種砂法物補助令其氣實然後於次年正月長齋於子後午前先作常行導引訖次行嘘字八數訖即取津唾含漱令熟候滿百口由左咽之細細而下以意送入丹田次下心火左旋八十一數其種藥含漱津唾取七口巳上若有餘力即不限口數量力爲之七日之内金砂乃下即晝夕常用白細甆盆一十五隻各用紙蓋子一箇蓋之上題日數至用盆盡日即將首初一盆淘取金砂周而復始其淘砂經隔日多貴其澄結毎淘砂須换水四五徧收在灰紙上堙乾收採半斤爲足二月採砂若未足即採至三月取足即止以至六月初一日依十二月一日法復用美酒珍味肉食補助一月至七月一日長齋謂止慾怒也至八月亦如二月行種砂法准前收採砂半斤爲足如採砂未足即採至九月取足乃止方將春秋採到金砂共一斤相合收貯淨潔器内封起候至十月長齋至十一月初一日下功乃將前藥一斤相拌令匀分之爲一十五分毎一分又分爲三分毎日於子寅辰三次服之自初一日服至望日服盡毎服藥時先以津漱鍊藥一分在口仍先空咽三咽後咽藥以意送歸丹田火行乾坤策毎日三時服藥三分毎時服藥行若此火也毎度服藥畢更以滑石末少許烹津咽之壓砂也并時服乳香少許使砂快利服砂日至午後閇息只行水時咽津也并至望日後毎日子後午前亦只閇息行氣謂只咽氣三數至十一月盡後更不行持毎遇逐月晦朔只閇息三十六數毎氣極即吐之毎日只食淡熟白麫二餐毎不得過三兩此亦名火也直候砂不下即是功成無漏自十一月十五日後金砂未熟亦時有下者須用意收之不可因循遺棄為其砂巳有功法在内直至金砂不下即是無漏丹成所下金砂亦須旋服之丹成之後一任餐啜日食數餐飽即呵之其食悉去漸無滓穢旋溺以至無漏不食终年亦不飢餒永爲地仙大約功止在一年之内行功之時若頭目昏眩齒牙動摇並是陽盛之故但濃煎甘草湯時時飲之即自解矣茲乃是金砂秘方修鍊内藥易凡質入地仙之上法也沖虚子大藥眞鉛訣丹砂爲體本因日月流精結而成物其丹砂旣堪抽汞汞即日之華故丹砂復可採鉛鉛即月之氣若能採得丹砂中鉛即可配丹砂中汞合而修至藥乃隂陽備矣即是眞汞眞鉛修之則萬無一失故申屠先生三字訣本一物分兩體一象鉛一象汞又古謌云一母生兩子一男復一女此二物一鉛一汞也若採得眞鉛欲修至藥其爐鼎火候合造服餌之式則諸丹經中悉有之惟此眞鉛不能知識耳訣曰流轉金精養萬神自然不死得長生靈藥不干諸外藥隂陽相制自然成肝四位權衡總屬君獨居甲乙自稱尊到頭復讓離中火突入南宫第二門心形方一寸號靈臺火德相生大矣哉直候六陽歸正数眞鉛流過向西來肺外應西方白虎兒便凝秋氣入霜肌如今巳得靈和味漸覺元君道便肥腎一海瓊波在北方何人如此到金鄉看看便見還丹就上火功夫不可量脾光輝五色動金精滋味甜和藥巳成好是百神皆稽首中原天子賀昇平又訣曰天地元爐藥在身隂陽不測謂之神元氣飛霜飛九轉還丹本是太和精煙霞欲去如何去先須肘後飛金精金精若到上宮裏中宮下宮都來迎自然玉汞㳙㳙生奔歸元海作雷聲從此夫妻相契㑹歡生踊躍情無外水火相交兩半間末後翻成地天泰夾脊雙關至頂門修行道路此爲根華池玉液冝頻咽紫府元君直上奔常使氣衝關節透自然精實谷神存一朝引到長生地須報當來指教恩夫津液眞陽清眀甘潔先自丹元及五藏之眞氣復能生丹元及五藏之眞氣入肝成氣入心生血入脾生黄芽入肺生液入腎生精補腦實體强筋骨恱顏色潤肌膚實布不漏化即爲氣住即爲丹以致元神混元經云天地造化成人然父者木也精者火也二象元是一氣木者主也火即爲用母者金也精者水也金即爲主水即爲用父與母精與氣此四象遇土即相生不遇土即相剋母之宮者眞土也四象氣至此宮自然相順共聚爲寶神氣精用爲一身之主也神者脾氣也氣者金水之氣也精者火木之氣也爲人身之三奇肘後訣云隂陽運轉氣化爲精精化爲朱朱化爲汞汞化爲金金化爲藥號爲金砂鍊爲還丹元海氣之所結爲黑鉛左腎氣之所結爲紅鉛坎離二用法訣曰欲得長生當修所生之本始於精氣精氣結而成形則知形為受氣之本氣是有形之本也然氣不得形氣無因而成元氣所禀之時伏母臍下混沌三月玄牝具馬玄牝口鼻也玄牝旣立如𤓰之有帶隂注母氣始於此也母呼子亦呼母吸子亦吸綿綿十月氣足神備解胎離母貪恱於子當不知形耗外也變嬰而為孩指頤能笑先眞議云以爲失道而喪之本也何況十五成童二十弱冠目眩五色耳聽五音設智運神間不容息如此純朴之根蕩然而盡是故聖人知外用無益所以還元返本握固胎息得長生不死之訣其理明矣中胎經云形中子母何不守之且形氣爲母神氣爲子形氣先立而後有神神與氣而合行循環於藏府之間御呼吸以上下久久修習神自明氣自和若神自明照徹五藏氣自和則通使於四肢故黃帝内示一神光内生綿綿五藏斯言可推而得也黄庭經云仙人道士非有神積精累氣乃成眞皆其妙也今之世人神之與氣各行子母不相守氣雖呼吸於内神常運於外如此使氣逐穢濁而不明則元氣漸散矣故神爲主形而宅舍主人不營於内日用於外也自然宅舍空虚漸見危壤矣而況非道之人勞神役氣無一息而住於形中於道遠矣若神氣之所至子母之運行則修生之門不日可至矣坎離二用故云從陽爻起旣濟徙隂爻起未濟兩卦併行周而復始奪天地造化之全功迺神仙命機之要術故曰白虎生從坎青龍伏在離易曰大哉乾乎剛健中正純粹精也謂乾體純陽其性至剛其行王健中正謂二與五也故云剛健中正凡修氣者變旣濟未濟水火之象使六爻俱陽以成乾體則純粹矣純而不雜則精明矣故云純粹精也且三五一是陽位發生之象二四六是隂位收殺之義陽起火隂起水在人之身水火若交是名旣濟若行此卦與六十四卦功力同矣所爲陽火昇上極則生隂隂水下降自然生陽火龍汞清氣左旋水虎鉛濁氣右走同行於身矣陽七返燒金丹至寅隂九還鍊玉液至子二物自然一逆一順入人五藏徧人身體日夜不絶故得長生法則天地是以天不言而四時行地不言而萬物生人不言而至道成其在口訣不傳文字幸遇同志聊述其概云爾太清修丹秘訣
